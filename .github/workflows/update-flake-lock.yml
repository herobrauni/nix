name: Update flake.lock

on:
  schedule:
    # 03:00 UTC daily, ensuring the new flake.lock is on main before hosts
    # auto-upgrade at 04:00 UTC (with up to 30 min randomised delay).
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-flake-lock
  cancel-in-progress: false

jobs:
  update:
    runs-on: nix-runner
    timeout-minutes: 120
    env:
      NIKS3_SERVER_URL: http://niks3.niks3.svc.cluster.local:5751
      NIX_CONFIG: |
        experimental-features = nix-command flakes
        accept-flake-config = true
        extra-substituters = http://niks3.niks3.svc.cluster.local:5751
        extra-trusted-public-keys = SIGNING_KEY:L2S1rOofwctOTq+ygU/myKHJGhuL2qu/hzAOD1q2SG4=
    steps:
      # Pinned to immutable commit SHAs for supply-chain safety.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Refresh generated flake and update inputs
        run: |
          nix run .#write-flake
          nix flake update
          nix run .#write-flake

      - name: Detect flake changes
        id: changes
        run: |
          if git diff --quiet -- flake.nix flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No flake input updates available."
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          git diff --stat -- flake.nix flake.lock

      - name: Build Niks3 client
        id: niks3
        if: steps.changes.outputs.changed == 'true'
        run: |
          path=$(nix build --no-link --print-out-paths github:Mic92/niks3/v1.4.0#niks3)
          echo "path=${path}" >> "$GITHUB_OUTPUT"

      - name: Prepare Niks3 auth token
        if: steps.changes.outputs.changed == 'true'
        env:
          NIKS3_API_TOKEN: ${{ secrets.NIKS3_API_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${NIKS3_API_TOKEN}" ]; then
            echo "NIKS3_API_TOKEN GitHub secret is required"
            exit 1
          fi

          token_file="$RUNNER_TEMP/niks3-token"
          printf '%s' "$NIKS3_API_TOKEN" > "$token_file"
          chmod 600 "$token_file"
          echo "NIKS3_AUTH_TOKEN_FILE=${token_file}" >> "$GITHUB_ENV"

      - name: Auto-format (formatter versions may have changed)
        if: steps.changes.outputs.changed == 'true'
        run: |
          nix shell nixpkgs#nixfmt-rfc-style nixpkgs#prettier nixpkgs#deadnix -c bash -c '
            nixfmt $(find . -path ./.git -prune -o -type f -name "*.nix" -print)
            prettier --write $(find . -path ./.git -prune -o -type f \( -name "*.md" -o -name "*.json" -o -name "*.yml" \) -print)
            deadnix --fix modules/ secrets.nix || true
            if ! git diff --quiet; then
              git add -A
              git commit -m "style: auto-format after flake update"
            fi
          '

      - name: Run flake checks
        if: steps.changes.outputs.changed == 'true'
        run: nix flake check

      - name: Build x86_64 NixOS hosts
        if: steps.changes.outputs.changed == 'true'
        run: |
          mapfile -t hosts < <(
            nix eval --json .#nixosConfigurations --apply 'x: builtins.attrNames x' | jq -r '.[]'
          )

          if [ "${#hosts[@]}" -eq 0 ]; then
            echo "No nixosConfigurations found"
            exit 1
          fi

          printf 'Discovered hosts: %s\n' "${hosts[*]}"

          targets=()
          for host in "${hosts[@]}"; do
            system=$(nix eval --raw ".#nixosConfigurations.${host}.config.nixpkgs.hostPlatform.system" 2>/dev/null || echo "x86_64-linux")
            if [ "$system" != "x86_64-linux" ]; then
              echo "Skipping ${host} (${system} - needs native builder)"
              continue
            fi
            targets+=(".#nixosConfigurations.${host}.config.system.build.toplevel")
          done

          if [ "${#targets[@]}" -eq 0 ]; then
            echo "No x86_64-linux nixosConfigurations found"
            : > "$RUNNER_TEMP/toplevel-paths.txt"
            exit 0
          fi

          nix build --no-link --print-out-paths "${targets[@]}" | tee "$RUNNER_TEMP/toplevel-paths.txt"

      - name: Push host closures to Niks3
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -euo pipefail

          mapfile -t outputs < "$RUNNER_TEMP/toplevel-paths.txt" 2>/dev/null || true
          if [ "${#outputs[@]}" -gt 0 ]; then
            "${{ steps.niks3.outputs.path }}/bin/niks3" push "${outputs[@]}"
          fi

      - name: Commit and push flake updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add flake.nix flake.lock
          git commit -m "flake: nightly input update"
          git push origin HEAD:main
