name: Build and Push to Cachix

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        host:
          - nixtest1
          - nixtest2
    steps:
      # Pinned to immutable commit SHAs for supply-chain safety.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: DeterminateSystems/nix-installer-action@e50d5f73bfe71c2dd0aa4218de8f4afa59f8f81d # v16

      # Cachix is the binary cache for this repo; no separate GitHub/FlakeHub cache layer needed.
      - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
        with:
          name: brauni
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build and push full closure for ${{ matrix.host }}
        run: |
          target='.#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel'
          nix build "$target"
          cachix push brauni $(nix path-info --recursive "$target")
