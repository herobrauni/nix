name: Build and Push to Cachix

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        host:
          - nixtest1
          - nixtest2
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: DeterminateSystems/magic-nix-cache-action@v9

      - uses: cachix/cachix-action@v15
        with:
          name: brauni
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build and push full closure for ${{ matrix.host }}
        run: |
          target='.#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel'
          nix build "$target"
          cachix push brauni $(nix path-info --recursive "$target")
