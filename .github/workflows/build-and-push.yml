name: Build and Push to Cachix

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Pinned to immutable commit SHAs for supply-chain safety.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      # Cachix is the binary cache for this repo; no separate GitHub/FlakeHub cache layer needed.
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: brauni
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Run flake checks (including formatting)
        run: nix flake check

      - name: Build and push full closure for all discovered NixOS hosts
        run: |
          mapfile -t hosts < <(
            nix eval --json .#nixosConfigurations --apply 'x: builtins.attrNames x' | jq -r '.[]'
          )

          if [ "${#hosts[@]}" -eq 0 ]; then
            echo "No nixosConfigurations found"
            exit 1
          fi

          printf 'Discovered hosts: %s\n' "${hosts[*]}"

          targets=()
          for host in "${hosts[@]}"; do
            targets+=(".#nixosConfigurations.${host}.config.system.build.toplevel")
          done

          nix build "${targets[@]}"
          cachix push brauni $(nix path-info --recursive "${targets[@]}")
