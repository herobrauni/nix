name: Build and Push to Cachix

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        host:
          - nixtest1
          - nixtest2
    steps:
      # Pinned to immutable commit SHAs for supply-chain safety.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      # Cachix is the binary cache for this repo; no separate GitHub/FlakeHub cache layer needed.
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: brauni
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build and push full closure for ${{ matrix.host }}
        run: |
          target='.#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel'
          nix build "$target"
          cachix push brauni $(nix path-info --recursive "$target")
