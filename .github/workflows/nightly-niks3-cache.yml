name: Nightly Niks3 Cache

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-niks3-cache
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: nix-runner
    timeout-minutes: 360
    env:
      NIKS3_SERVER_URL: http://niks3.niks3.svc.cluster.local:5751
      NIX_CONFIG: |
        experimental-features = nix-command flakes
        accept-flake-config = true
        extra-substituters = http://niks3.niks3.svc.cluster.local:5751
        extra-trusted-public-keys = SIGNING_KEY:L2S1rOofwctOTq+ygU/myKHJGhuL2qu/hzAOD1q2SG4=

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Prepare Niks3 auth token
        env:
          NIKS3_API_TOKEN: ${{ secrets.NIKS3_API_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${NIKS3_API_TOKEN}" ]; then
            echo "NIKS3_API_TOKEN GitHub secret is required"
            exit 1
          fi

          token_file="$RUNNER_TEMP/niks3-token"
          printf '%s' "$NIKS3_API_TOKEN" > "$token_file"
          chmod 600 "$token_file"
          echo "NIKS3_AUTH_TOKEN_FILE=${token_file}" >> "$GITHUB_ENV"

      - name: Build Niks3 client
        id: niks3
        run: |
          path=$(nix build --no-link --print-out-paths github:Mic92/niks3/v1.4.0#niks3)
          echo "path=${path}" >> "$GITHUB_OUTPUT"

      - name: Discover NixOS hosts
        id: hosts
        run: |
          mapfile -t hosts < <(
            nix eval --json .#nixosConfigurations --apply 'x: builtins.attrNames x' | jq -r '.[]'
          )

          if [ "${#hosts[@]}" -eq 0 ]; then
            echo "No nixosConfigurations found"
            exit 1
          fi

          printf 'Discovered hosts: %s\n' "${hosts[*]}"
          printf '%s\n' "${hosts[@]}" > "$RUNNER_TEMP/hosts.txt"

      - name: Build x86_64 NixOS hosts
        run: |
          mapfile -t hosts < "$RUNNER_TEMP/hosts.txt"

          targets=()
          for host in "${hosts[@]}"; do
            system=$(nix eval --raw ".#nixosConfigurations.${host}.config.nixpkgs.hostPlatform.system" 2>/dev/null || echo "x86_64-linux")
            if [ "$system" != "x86_64-linux" ]; then
              echo "Skipping ${host} (${system})"
              continue
            fi
            targets+=(".#nixosConfigurations.${host}.config.system.build.toplevel")
          done

          nix build --no-link --print-out-paths "${targets[@]}" | tee "$RUNNER_TEMP/toplevel-paths.txt"

      - name: Push host closures to Niks3
        run: |
          set -euo pipefail

          mapfile -t outputs < "$RUNNER_TEMP/toplevel-paths.txt" 2>/dev/null || true
          if [ "${#outputs[@]}" -gt 0 ]; then
            "${{ steps.niks3.outputs.path }}/bin/niks3" push "${outputs[@]}"
          fi
